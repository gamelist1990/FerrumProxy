name: Build FerrumProxyGUI

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - "FerrumGUI/**"
      - ".github/workflows/ferrumproxygui-build.yml"
  pull_request:
    paths:
      - "FerrumGUI/**"
      - ".github/workflows/ferrumproxygui-build.yml"

concurrency:
  group: ferrumproxygui-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build GUI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FerrumGUI

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: FerrumGUI/frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build:frontend

      - name: Generate embedded files
        run: bun run generate:embed

      - name: Compute BUILD_VERSION
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DATE="$(date -u +%Y.%m.%d)"
          VERSION="${DATE}-${SHORT_SHA}"
          echo "BUILD_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Building FerrumProxyGUI ${VERSION}"

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/build
          # Bun の --define は JS 値としてパースされるので、文字列は '"..."' の形で渡す
          BV_DEFINE="BUILD_VERSION=\"${BUILD_VERSION}\""
          bun build --compile --minify --asset-naming="[name].[ext]" --define "$BV_DEFINE" --target=bun-linux-x64   ./src/index.ts --outfile target/build/FerrumProxyGUI-linux-x64
          bun build --compile --minify --asset-naming="[name].[ext]" --define "$BV_DEFINE" --target=bun-linux-arm64 ./src/index.ts --outfile target/build/FerrumProxyGUI-linux-arm64
          bun build --compile --minify --asset-naming="[name].[ext]" --define "$BV_DEFINE" --target=bun-windows-x64 ./src/index.ts --outfile target/build/FerrumProxyGUI-windows-x64.exe
          bun build --compile --minify --asset-naming="[name].[ext]" --define "$BV_DEFINE" --target=bun-darwin-arm64 ./src/index.ts --outfile target/build/FerrumProxyGUI-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FerrumProxyGUI
          path: FerrumGUI/target/build/FerrumProxyGUI-*
          if-no-files-found: error

  release:
    name: Release FerrumProxyGUI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: FerrumProxyGUI
          path: release-assets

      - name: Generate version.json
        run: node repo/scripts/gen-version-json.mjs gui FerrumProxyGUI release-assets

      - name: Publish fixed FerrumProxyGUI release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: FerrumProxyGUI
          name: FerrumProxyGUI
          body: |
            Latest FerrumProxyGUI build from `${{ github.sha }}`.

            Action: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
          files: |
            release-assets/FerrumProxyGUI-*
            release-assets/version.json
          fail_on_unmatched_files: true
          overwrite_files: true
