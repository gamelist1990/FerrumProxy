name: Build FerrumProxy

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "CMakeLists.txt"
      - "config.example.yml"
      - "scripts/**"
      - "src/**"
      - ".github/workflows/ferrumproxy-build.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "CMakeLists.txt"
      - "config.example.yml"
      - "scripts/**"
      - "src/**"
      - ".github/workflows/ferrumproxy-build.yml"

concurrency:
  group: ferrumproxy-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ferrum-proxy.exe
            asset: FerrumProxy-windows-x64.exe
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ferrum-proxy
            asset: FerrumProxy-linux-x64
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: ferrum-proxy
            asset: FerrumProxy-linux-arm64
          - platform: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            binary: ferrum-proxy
            asset: FerrumProxy-macos-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Check format
        run: cargo fmt --check

      - name: Check
        run: cargo check --target ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "target/build/${{ matrix.platform }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
             "target/build/${{ matrix.platform }}/${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FerrumProxy-${{ matrix.platform }}
          path: target/build/${{ matrix.platform }}/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Release FerrumProxy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: FerrumProxy-*
          path: release-assets
          merge-multiple: true

      - name: Publish fixed FerrumProxy release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: FerrumProxy
          name: FerrumProxy
          body: |
            Latest FerrumProxy build from `${{ github.sha }}`.

            Action: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
          files: release-assets/FerrumProxy-*
          fail_on_unmatched_files: true
          overwrite_files: true
