endpoint: 6000
useRestApi: false
savePlayerIP: true
debug: false

# Automatic host firewall configuration. When enabled, FerrumProxy detects the
# active firewall on this host (ufw > firewalld > nftables > iptables on Linux,
# netsh on Windows) and adds ACCEPT rules for each listener's TCP/UDP port.
# Existing rules are detected and left alone -- no duplicates.
# Disable this if you manage the firewall externally (cloud security groups,
# reverse-proxy in front, etc.).
firewall:
  enabled: true
  # auto | off | ufw | firewalld | iptables | nftables | netsh
  mode: auto
sharedService:
  enabled: false
  controlBind: 0.0.0.0:7000
  publicBind: 0.0.0.0
  publicHost: ""
  serverSalt: ""
  portRange:
    start: 40000
    end: 49999
  authTokens: []
  allowAnonymous: true
  queue:
    enabled: true
    maxSize: 128
  tokens: []
  defaults:
    maxBytesPerSecond: 10485760
    idleTimeoutSeconds: 120
    udpSessionTimeoutSeconds: 60
  maximums:
    maxBytesPerSecond: 104857600
    idleTimeoutSeconds: 3600
    udpSessionTimeoutSeconds: 600

# Optional "very slow client" mode. When `enabled` is true, FerrumProxy stretches
# the three latency-sensitive timeouts so that clients with 1000ms - 5000ms RTT
# can complete their handshake and stay connected without being torn down.
# Defaults below are the recommended preset for extremely laggy clients.
highLatency:
  enabled: false
  initialClientDataTimeoutMs: 30000    # 30s wait for the first client bytes
  connectTimeoutMs: 30000              # 30s to connect to the backend
  udpSessionIdleTimeoutMs: 600000      # 10 minutes UDP idle

# Per-IP DDoS protection. Defaults are relaxed for HTTP/HTTPS reverse-proxy use
# (a browser opens many parallel connections per page). Lower them to harden, or
# set enabled: false if a trusted upstream load balancer already protects you.
ddosGuard:
  enabled: true
  tcpMaxActivePerIp: 256
  tcpNewConnectionsPerSecond: 100
  tcpNewConnectionBurst: 500
  udpPacketsPerSecond: 240
  udpPacketBurst: 480
  udpBytesPerSecond: 2097152
  udpByteBurst: 4194304
  udpMaxDatagramBytes: 8192
listeners:
  - bind: 0.0.0.0
    tcp: 25565
    udp: 25565
    haproxy: false
    https:
      enabled: false
      autoDetect: true
      letsEncryptDomain: example.com
      certPath: ./certs/fullchain.pem
      keyPath: ./certs/privkey.pem
    webhook: ""
    rewriteBedrockPongPorts: true
    targets:
      - host: 127.0.0.1
        tcp: 19132
        udp: 19132
    # Optional HTTP/HTTPS path mappings. The longest matching path wins.
    # /pages/example is routed to /pages before /.
    httpMappings:
      - path: /
        target:
          host: https://example.com/
      - path: /pages
        target:
          host: https://example.com/docs
